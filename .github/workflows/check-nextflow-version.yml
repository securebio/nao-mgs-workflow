name: Check Nextflow version is latest

on:
  pull_request: # Runs on all PRs

permissions:
  contents: read

jobs:
  check-nextflow-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python with project dependencies
        uses: ./.github/actions/setup-python

      - name: Check Nextflow version is latest
        run: python bin/check_nextflow_version.py
