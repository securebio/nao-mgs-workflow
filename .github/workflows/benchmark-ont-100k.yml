name: Benchmark test (ONT 100k)

# Release test - only runs on PRs to main/stable. For on-demand benchmarking
# from any branch (e.g. draft PRs to dev), use benchmark-on-demand.yml.
on:
  pull_request:
    branches: [main, stable, ci-test]

permissions:
  id-token: write
  contents: read

concurrency:
  group: benchmark-ont-100k-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  benchmark-ont-100k:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for relevant changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            relevant:
              - 'tests/modules/**'
              - 'modules/**'
              - 'tests/subworkflows/**'
              - 'subworkflows/**'
              - 'tests/workflows/**'
              - 'workflows/**'
              - 'bin/chain_workflows.py'
              - 'configs/**'
              - 'tests/configs/**'
              - '.github/workflows/benchmark-ont-100k.yml'
              - '.github/actions/run-benchmark/**'
              - '.github/actions/setup-nf-test/**'

      - name: Run benchmark
        if: steps.filter.outputs.relevant == 'true'
        uses: ./.github/actions/run-benchmark
        with:
          samplesheet: s3://nao-testing/benchmarks/ONT_100k/metadata/samplesheet.csv
          launch-dir: test_run_benchmark_ont_100k
          bench-name: benchmark-ont-100k
          platform: ont
          rust-version: ${{ github.base_ref == 'stable' && 'main' || 'dev' }}
          aws-role-arn: ${{ secrets.AWS_OIDC_ROLE_ARN }}
          tower-token: ${{ secrets.TOWER_ACCESS_TOKEN }}
