name: 'Claude Agent'
description: >-
  Run an in-CI Claude Code agent against a prompt, minting a short-lived
  GitHub App token so the agent acts as the coding-agent app (Anthropic API-key auth).

inputs:
  prompt:
    description: 'The prompt driving the agent for this run.'
    required: true
  anthropic-api-key:
    description: 'Anthropic API key for direct API access.'
    required: true
  app-private-key:
    description: 'Private key for the coding-agent GitHub App used to mint the token.'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Mint GitHub App token
      id: app-token
      uses: actions/create-github-app-token@v1
      with:
        # Public numeric App id of the coding-agent GitHub App (not a secret).
        app-id: '3941495'
        private-key: ${{ inputs.app-private-key }}

    - name: Run Claude Code agent
      # Pin to a current stable major tag. NOTE: there is no existing usage of
      # anthropics/claude-code-action in this org to copy — confirm the exact
      # version (and input names) against the action's README before relying on it.
      uses: anthropics/claude-code-action@v1
      with:
        prompt: ${{ inputs.prompt }}
        anthropic_api_key: ${{ inputs.anthropic-api-key }}
        github_token: ${{ steps.app-token.outputs.token }}
