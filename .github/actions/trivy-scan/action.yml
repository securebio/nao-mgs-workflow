name: 'Trivy Container Scan'
description: >-
  Scan the containers pinned in configs/containers.config with Trivy and always
  upload the results; sets a `found` output for HIGH/CRITICAL CVEs (does not gate).

inputs:
  aws-role-arn:
    description: 'ARN of the IAM role to assume via OIDC for ECR Public access. Passed as an input (not read from secrets) because composite actions cannot read secrets directly.'
    required: true

outputs:
  found:
    description: "'true' if HIGH/CRITICAL vulnerabilities were found, 'false' otherwise."
    value: ${{ steps.scan.outputs.found }}

runs:
  using: 'composite'
  steps:
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ inputs.aws-role-arn }}
        aws-region: us-east-1

    - name: Login to ECR Public
      shell: bash
      run: |
        aws ecr-public get-login-password --region us-east-1 | docker login --username AWS --password-stdin public.ecr.aws

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Trivy
      shell: bash
      env:
        TRIVY_VERSION: "0.69.3"
        TRIVY_SHA256: "a484057aafde31089cf2558ca0f79a4bc835125a5ee6834183a5bcf0735af358"
      run: |
        curl -sL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.deb" -o "trivy_${TRIVY_VERSION}_Linux-64bit.deb"
        echo "${TRIVY_SHA256}  trivy_${TRIVY_VERSION}_Linux-64bit.deb" | sha256sum --check
        sudo dpkg -i "trivy_${TRIVY_VERSION}_Linux-64bit.deb"

    - name: Run Trivy scan
      id: scan
      shell: bash
      run: |
        set +e
        python bin/scan_containers.py --config "configs/containers.config" --output-dir "trivy_results"
        code=$?
        set -e
        if [ "$code" -eq 0 ]; then
          echo "found=false" >> "$GITHUB_OUTPUT"
        elif [ "$code" -eq 1 ]; then
          # scan_containers.py exits 1 when HIGH/CRITICAL vulnerabilities are found.
          echo "found=true" >> "$GITHUB_OUTPUT"
        else
          echo "::error::bin/scan_containers.py failed with exit code $code" >&2
          exit "$code"
        fi

    - name: Upload scan results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: trivy-scan-results
        path: trivy_results/
